<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de decisao para insulfilm residencial</title>
  <desc id="desc">Composicao editorial com vidro residencial, luz solar filtrada e quatro criterios de escolha: calor, privacidade, luz e protecao UV.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1500" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09182A"/>
      <stop offset="0.5" stop-color="#04080F"/>
      <stop offset="1" stop-color="#171106"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F9E19A"/>
      <stop offset="0.52" stop-color="#C9A227"/>
      <stop offset="1" stop-color="#7A6114"/>
    </linearGradient>
    <linearGradient id="glass" x1="416" y1="176" x2="1086" y2="742" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8F3FF" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#88B7D2" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1268 182) rotate(90) scale(158)">
