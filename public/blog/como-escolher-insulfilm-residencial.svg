    <path d="M1250 206L1016 390" stroke="#F9E19A" stroke-opacity="0.42" stroke-width="3"/>
    <path d="M1318 232L1016 468" stroke="#F9E19A" stroke-opacity="0.32" stroke-width="3"/>
    <path d="M1388 274L1016 548" stroke="#F9E19A" stroke-opacity="0.22" stroke-width="3"/>
