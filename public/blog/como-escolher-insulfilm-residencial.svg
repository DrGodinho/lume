      <stop offset="0.52" stop-color="#C9A227" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
