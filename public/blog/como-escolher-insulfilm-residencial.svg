    <text x="174" y="664" fill="#F9E19A" font-size="24" font-weight="800" font-family="Montserrat, Arial, sans-serif">Privacidade</text>
    <text x="174" y="700" fill="#B7C1D0" font-size="18" font-family="Inter, Arial, sans-serif">dia, noite, vista e fachada</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1064" y="572" width="382" height="126" rx="28" fill="#08111D" stroke="#C9A227" stroke-opacity="0.22"/>
    <text x="1100" y="624" fill="#F9E19A" font-size="24" font-weight="800" font-family="Montserrat, Arial, sans-serif">Protecao UV</text>
    <text x="1100" y="660" fill="#B7C1D0" font-size="18" font-family="Inter, Arial, sans-serif">moveis, pisos, cortinas e pele</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1084" y="314" width="330" height="126" rx="28" fill="#08111D" stroke="#C9A227" stroke-opacity="0.22"/>
    <text x="1120" y="366" fill="#F9E19A" font-size="24" font-weight="800" font-family="Montserrat, Arial, sans-serif">Luz natural</text>
    <text x="1120" y="402" fill="#B7C1D0" font-size="18" font-family="Inter, Arial, sans-serif">conforto sem peso visual</text>
  </g>

  <path d="M446 224L328 214" stroke="#C9A227" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
  <path d="M468 646L362 674" stroke="#C9A227" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
  <path d="M994 626L1108 636" stroke="#C9A227" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
