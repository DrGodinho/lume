    <text x="152" y="202" fill="#F9E19A" font-size="24" font-weight="800" font-family="Montserrat, Arial, sans-serif">Calor</text>
    <text x="152" y="238" fill="#B7C1D0" font-size="18" font-family="Inter, Arial, sans-serif">controle termico sem apagar a luz</text>
  </g>
