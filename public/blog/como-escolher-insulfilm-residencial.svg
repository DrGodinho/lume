  </defs>

  <rect width="1600" height="900" rx="40" fill="#04080F"/>
  <rect x="56" y="56" width="1488" height="788" rx="36" fill="url(#bg)" stroke="#C9A227" stroke-opacity="0.22" stroke-width="2"/>
  <rect x="56" y="56" width="1488" height="788" rx="36" fill="url(#grid)"/>
  <circle cx="1268" cy="182" r="210" fill="url(#sun)"/>

