<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Infográfico profissional sobre proteção do insulfilm</title>
  <desc id="desc">Resumo visual das três frentes de proteção do insulfilm: raios UV, calor e preservação dos acabamentos.</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="1544" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081522"/>
      <stop offset="0.55" stop-color="#04080F"/>
      <stop offset="1" stop-color="#141007"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F7DC84"/>
      <stop offset="0.55" stop-color="#C9A227"/>
      <stop offset="1" stop-color="#7E6413"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" rx="36" fill="#04080F"/>
  <rect x="56" y="56" width="1488" height="788" rx="34" fill="url(#bg)" stroke="#C9A227" stroke-opacity="0.22" stroke-width="2"/>
  <rect x="56" y="56" width="1488" height="788" rx="34" fill="url(#grid)"/>

  <text x="118" y="140" fill="#F7DC84" font-size="44" font-weight="800" font-family="Montserrat, Arial, sans-serif">Três frentes de proteção do insulfilm</text>
  <text x="118" y="186" fill="#AEB8C7" font-size="22" font-family="Inter, Arial, sans-serif">Um único ponto de aplicação ajuda a proteger conforto, estética e durabilidade do ambiente.</text>

  <g filter="url(#shadow)">
    <rect x="118" y="258" width="405" height="376" rx="28" fill="#08111D" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M322 356A100 100 0 1 1 321.9 356" stroke="#172334" stroke-width="20" stroke-linecap="round"/>
    <path d="M322 356A100 100 0 1 1 236 507" stroke="url(#gold)" stroke-width="20" stroke-linecap="round"/>
    <text x="274" y="465" fill="#FFFFFF" font-size="54" font-weight="800" font-family="Montserrat, Arial, sans-serif">UV</text>
    <text x="172" y="558" fill="#F7DC84" font-size="27" font-weight="800" font-family="Montserrat, Arial, sans-serif">Proteção solar</text>
    <text x="172" y="594" fill="#AEB8C7" font-size="18" font-family="Inter, Arial, sans-serif">reduz a radiação que causa desbotamento</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="598" y="258" width="405" height="376" rx="28" fill="#08111D" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M800 352C852 410 870 470 850 540C823 566 777 566 750 540C730 470 748 410 800 352Z" fill="rgba(201,162,39,0.14)" stroke="#C9A227" stroke-width="6"/>
    <path d="M800 402C825 437 834 477 824 516C811 530 789 530 776 516C766 477 775 437 800 402Z" fill="url(#gold)"/>
    <text x="650" y="558" fill="#F7DC84" font-size="27" font-weight="800" font-family="Montserrat, Arial, sans-serif">Controle térmico</text>
    <text x="650" y="594" fill="#AEB8C7" font-size="18" font-family="Inter, Arial, sans-serif">menos calor atravessando o vidro exposto</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1078" y="258" width="405" height="376" rx="28" fill="#08111D" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <rect x="1170" y="384" width="222" height="112" rx="20" fill="#162133" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <rect x="1202" y="334" width="158" height="68" rx="20" fill="#263144"/>
    <rect x="1218" y="496" width="28" height="60" rx="8" fill="#C9A227"/>
    <rect x="1318" y="496" width="28" height="60" rx="8" fill="#C9A227"/>
    <path d="M1146 362C1190 308 1374 308 1418 362" stroke="#C9A227" stroke-width="7" stroke-linecap="round"/>
    <text x="1130" y="558" fill="#F7DC84" font-size="27" font-weight="800" font-family="Montserrat, Arial, sans-serif">Acabamentos</text>
    <text x="1130" y="594" fill="#AEB8C7" font-size="18" font-family="Inter, Arial, sans-serif">menos desgaste em móveis, pisos e cortinas</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="226" y="684" width="1148" height="86" rx="24" fill="#0B1624" stroke="#C9A227" stroke-opacity="0.24"/>
    <path d="M304 727H1296" stroke="#C9A227" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="304" cy="727" r="14" fill="url(#gold)"/>
    <circle cx="800" cy="727" r="14" fill="url(#gold)"/>
    <circle cx="1296" cy="727" r="14" fill="url(#gold)"/>
    <text x="332" y="735" fill="#D8DEE8" font-size="20" font-family="Inter, Arial, sans-serif">radiação filtrada</text>
    <text x="828" y="735" fill="#D8DEE8" font-size="20" font-family="Inter, Arial, sans-serif">ambiente mais confortável</text>
    <text x="1096" y="735" fill="#D8DEE8" font-size="20" font-family="Inter, Arial, sans-serif">móveis preservados</text>
  </g>
</svg>
