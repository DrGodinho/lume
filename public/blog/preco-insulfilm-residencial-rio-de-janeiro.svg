      <stop offset="0.47" stop-color="#081321"/>
      <stop offset="1" stop-color="#0F1621"/>
    </linearGradient>
    <linearGradient id="gold" x1="197" y1="84" x2="948" y2="570" gradientUnits="userSpaceOnUse">
