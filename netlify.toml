[build]
  command = "npm run build"
  publish = ".next"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.xml"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.txt"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
