[build]
  command = "npm run build"
  publish = ".next"

[[headers]]
for = "/*"
[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self' https://wa.me https://api.whatsapp.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://stats.g.doubleclick.net; frame-src 'self' https://www.google.com https://maps.google.com; manifest-src 'self'; worker-src 'self' blob:"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/*.jpeg"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/*.webp"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/blog/*.png"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/blog/*.jpg"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/blog/*.svg"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/login/*"
[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/crm/*"
[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/api/*"
[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/*.xml"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.txt"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
